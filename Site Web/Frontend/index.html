<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Météo Le Bourget-du-Lac</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .glass-panel {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
    </style>
</head>
<body class="bg-gradient-to-br from-blue-600 via-blue-800 to-slate-900 min-h-screen text-white flex flex-col items-center justify-center p-4">

    <div class="w-full max-w-md">
        <div class="text-center mb-8">
            <h1 class="text-3xl font-semibold tracking-wide">Le Bourget-du-Lac</h1>
            <p id="date-display" class="text-blue-200 text-sm mt-1">Mise à jour en cours...</p>
        </div>

        <div class="flex flex-col items-center justify-center mb-10">
            <i id="weather-icon" class="ph ph-sun text-8xl text-yellow-300 drop-shadow-lg mb-2"></i>
            
            <div class="flex items-start">
                <span id="temp-val" class="text-8xl font-bold tracking-tighter">--</span>
                <span class="text-4xl font-light mt-2 ml-1">°C</span>
            </div>
            
            <p id="weather-desc" class="text-2xl font-light mt-2 capitalize text-blue-100">En attente de l'IA...</p>
        </div>

        <div class="glass-panel rounded-3xl p-6 shadow-2xl">
            <h3 class="text-sm uppercase tracking-widest text-blue-200 mb-4 font-semibold">Détails des capteurs STM32</h3>
            
            <div class="grid grid-cols-2 gap-6">
                <div class="flex items-center">
                    <i class="ph ph-drop text-2xl text-blue-300 mr-3"></i>
                    <div>
                        <p class="text-xs text-blue-200 uppercase">Humidité</p>
                        <p id="hum-val" class="text-xl font-semibold">-- %</p>
                    </div>
                </div>

                <div class="flex items-center">
                    <i class="ph ph-wind text-2xl text-slate-300 mr-3"></i>
                    <div>
                        <p class="text-xs text-blue-200 uppercase">Vibration (G)</p>
                        <p id="accel-val" class="text-xl font-semibold">--</p>
                    </div>
                </div>
            </div>
        </div>
        
        <div class="text-center mt-6">
            <p class="text-xs text-blue-300 flex items-center justify-center gap-2">
                <span class="relative flex h-3 w-3">
                  <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-green-400 opacity-75"></span>
                  <span class="relative inline-flex rounded-full h-3 w-3 bg-green-500"></span>
                </span>
                Connecté au Cloud ThingSpeak
            </p>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
